<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Couple Chat - Financial Analysis</title>
    <link rel="stylesheet" href="style.css">
    <!-- i18next library -->
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/dist/umd/i18next.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Left: Dashboard -->
        <div class="dashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h1 data-i18n="dashboard.title">💑 Dashboard</h1>
                <!-- Language Selector - Top Right of Dashboard -->
                <div id="language-selector" style="display: flex; gap: 2px;">
                    <button id="lang-en" class="lang-btn active" title="English">🇬🇧</button>
                    <button id="lang-fr" class="lang-btn" title="Français">🇫🇷</button>
                    <button id="lang-es" class="lang-btn" title="Español">🇪🇸</button>
                </div>
            </div>
            <div id="dashboard-feed" class="feed">
                <h2 data-i18n="dashboard.personal">Personal Information</h2>
                <table class="responses-table">
                    <thead>
                        <tr>
                            <th data-i18n="dashboard.person">Person</th>
                            <th data-i18n="dashboard.firstName">First Name</th>
                            <th data-i18n="dashboard.age">Age</th>
                            <th data-i18n="dashboard.salary">Salary</th>
                            <th data-i18n="dashboard.actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="responses-tbody">
                        <tr><td colspan="5" class="empty-state" data-i18n="dashboard.noResponses">No responses yet</td></tr>
                    </tbody>
                </table>
                
                <h2 style="margin-top: 30px;" data-i18n="dashboard.expenses">Expenses</h2>
                <table class="expenses-table">
                    <thead>
                        <tr>
                            <th data-i18n="dashboard.expenseLabel">Expense Label</th>
                            <th data-i18n="dashboard.amount">Amount</th>
                            <th data-i18n="dashboard.paidBy">Paid By</th>
                            <th data-i18n="dashboard.actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-tbody">
                        <tr><td colspan="4" class="empty-state" data-i18n="dashboard.noExpenses">No expenses yet</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right: Chat Window -->
        <div class="chat-window">
            <div class="chat-header">
                <div class="chat-header-top">
                    <h2 data-i18n="chat.title">💬 Chat</h2>
                    <span id="connection-status" class="status online" data-i18n="chat.online">● Online</span>
                </div>
                <div id="controls">
                    <button id="woman-btn" class="control-btn" style="background: #ff69b4; color: white;" data-i18n="buttons.womanQuestions">👩 Woman's Questions</button>
                    <button id="man-btn" class="control-btn" style="background: #4169e1; color: white;" data-i18n="buttons.manQuestions">👨 Man's Questions</button>
                    <button id="expenses-btn" class="control-btn" style="background: #ff9800; color: white;" data-i18n="buttons.addExpenses">💰 Add Expenses</button>
                </div>
            </div>

            <div id="chat-messages" class="chat-messages">
                <p class="empty-state" data-i18n="chat.startConversation">Start a conversation...</p>
            </div>

            <div class="chat-input-area">
                <input 
                    type="text" 
                    id="message-input" 
                    data-i18n-placeholder="chat.placeholder"
                    placeholder="Type your message..." 
                    autocomplete="off"
                >
                <button id="send-btn" onclick="ChatInputHandler.sendMessage()" data-i18n="chat.sendButton">Send</button>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script src="sync.js"></script>
    <script src="dashboard.js"></script>
    
    <!-- State and Managers -->
    <script src="managers/chatState.js"></script>
    <script src="managers/messageManager.js"></script>
    <script src="managers/dashboardManager.js"></script>
    <script src="managers/expenseManager.js"></script>
    <script src="managers/botManager.js"></script>
    <script src="managers/uiManager.js"></script>
    <script src="managers/chatInputHandler.js"></script>
    
    <!-- Main Controller -->
    <script src="chat.js"></script>
    
    <script>
        // Initialize i18n before other scripts
        initI18n().then(() => {
            // Setup event delegation for language buttons (survives DOM updates)
            setupLanguageDelegation();
            // Start monitoring language persistence
            ensureLanguagePersistence();
        });
    </script>
</body>
</html>
