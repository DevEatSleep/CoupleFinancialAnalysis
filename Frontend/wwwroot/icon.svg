<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#880e4f"/>
      <stop offset="100%" stop-color="#1a237e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Heart — proper two-bump shape using 4 cubic beziers -->
  <!-- bottom-tip → left-max → top-center-dip → right-max → bottom-tip -->
  <path d="
    M256,315
    C175,315 50,215 85,148
    C110,58  220,58  256,135
    C292,58  402,58  427,148
    C462,215 337,315 256,315
    Z"
    fill="white" opacity="0.93"/>

  <!-- Balance / equality scale -->
  <!-- Pivot dot -->
  <circle cx="256" cy="354" r="11" fill="white" opacity="0.92"/>
  <!-- Vertical post -->
  <rect x="250" y="354" width="12" height="56" rx="6" fill="white" opacity="0.92"/>
  <!-- Horizontal beam -->
  <rect x="132" y="368" width="248" height="13" rx="6" fill="white" opacity="0.92"/>
  <!-- Left cord -->
  <line x1="152" y1="381" x2="152" y2="424" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.88"/>
  <!-- Right cord -->
  <line x1="360" y1="381" x2="360" y2="424" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.88"/>
  <!-- Left pan -->
  <rect x="108" y="422" width="88" height="15" rx="7" fill="white" opacity="0.92"/>
  <!-- Right pan -->
  <rect x="316" y="422" width="88" height="15" rx="7" fill="white" opacity="0.92"/>
  <!-- Base foot -->
  <rect x="216" y="408" width="80" height="13" rx="6" fill="white" opacity="0.88"/>
</svg>
