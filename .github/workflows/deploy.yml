name: Deploy to Azure

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Publish Frontend
      run: dotnet publish Frontend/Frontend.csproj --configuration Release --output ./frontend-publish
    
    - name: Copy Frontend files to Backend wwwroot
      run: |
        mkdir -p Backend/wwwroot
        cp -r ./frontend-publish/wwwroot/* Backend/wwwroot/
    
    - name: Publish Backend with integrated Frontend
      run: dotnet publish Backend/CoupleChat.csproj --configuration Release --output ./backend-publish
    
    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_APP_NAME }}
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: ./backend-publish
