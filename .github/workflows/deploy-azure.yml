name: Deploy to Azure App Service

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore CoupleFinancialAnalysis.sln

    - name: Build
      run: dotnet build CoupleFinancialAnalysis.sln --configuration Release --no-restore

    - name: Publish Backend
      run: dotnet publish Backend/CoupleChat.csproj --configuration Release --output ./backend-publish

    - name: Publish Frontend
      run: dotnet publish Frontend/Frontend.csproj --configuration Release --output ./frontend-publish

    - name: Deploy to Azure App Service
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_APP_NAME }}
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: ./backend-publish

    - name: Notify deployment success
      if: success()
      run: echo "✅ Deployment to Azure succeeded!"

    - name: Notify deployment failure
      if: failure()
      run: echo "❌ Deployment to Azure failed!"
